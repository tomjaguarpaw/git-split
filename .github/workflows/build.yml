name: Build Haskell Executable

on:
  push:
    branches: [ haskell ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Haskell (Cabal)
        uses: haskell/actions/setup@v2
        with:
          cabal-version: latest
          ghc-version: latest

      - name: Update package list
        working-directory: haskell
        run: cabal update

      - name: Build project
        working-directory: haskell
        run: cabal build

      - name: Copy executable
        working-directory: haskell
        run: |
          mkdir -p ../dist-bin
          cp "$(cabal list-bin exe:git-split)" ../dist-bin/

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: my-executable
          path: dist-bin/
